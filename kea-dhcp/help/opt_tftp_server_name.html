<header>TFTP server name</header>

DHCPv4 option 66 value, commonly used by network boot clients to find a TFTP server. This is an <tt>option-data</tt> value, not a BOOTP packet field.
<p>

It is separate from the advanced <tt>next-server</tt> / <tt>siaddr</tt> field; some clients use one, some use the other, and some use both.
<p>
